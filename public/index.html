<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Docker Jenkins App</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }

        .container {
            background: rgba(255,255,255,0.1);
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
            backdrop-filter: blur(10px);
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 15px;
        }

        p {
            font-size: 1.2rem;
            margin-bottom: 20px;
        }

        .badge {
            display: inline-block;
            padding: 10px 20px;
            background: #00c853;
            color: white;
            border-radius: 30px;
            font-weight: bold;
        }

        .footer {
            margin-top: 25px;
            font-size: 0.9rem;
            opacity: 0.8;
        }

        button {
            margin-top: 20px;
            padding: 12px 25px;
            border: none;
            border-radius: 30px;
            background: #ff9800;
            color: white;
            font-size: 1rem;
            cursor: pointer;
        }

        button:hover {
            background: #e68900;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 Docker + Jenkins CI/CD</h1>
        <p>Your Node.js application is successfully deployed using Docker and Jenkins Pipeline.</p>
        <div class="badge">Build Success</div>
        <br>
        <button onclick="showMessage()">Click Me</button>
        <p id="message"></p>
        <div class="footer">
            Built by Ranjith | DevOps Practice Project
        </div>
    </div>

    <script>
        function showMessage() {
            document.getElementById("message").innerText = "🎉 CI/CD Pipeline is working perfectly!";
        }
    </script>
</body>
</html>
